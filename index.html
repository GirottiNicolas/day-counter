<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contador de Días</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1 id="contadorTitulo">Contador</h1>

    <input type="text" id="tituloInput" placeholder="Título del contador">

    <input type="date" id="fechaInput">

    <button onclick="iniciarContador()">Iniciar contador</button>

    <div id="countdown" class="countdown"></div>
    <p id="texto"></p>
  </div>

  <script src="app.js"></script>
</body>
</html>
